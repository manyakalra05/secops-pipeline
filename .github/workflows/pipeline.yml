name: SecOps Vulnerability Remediation Pipeline

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target GitHub repo URL (e.g. https://github.com/user/repo)"
        required: true
        type: string

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 0. Checkout YOUR pipeline repo ──────────────────────────────────
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      # ── 1. Clone the TARGET repo ─────────────────────────────────────────
      - name: Clone target repo
        run: |
          git clone "${{ github.event.inputs.target_repo }}" /tmp/target_repo
          REPO_PATH=$(echo "${{ github.event.inputs.target_repo }}" | sed 's|https://github.com/||')
          echo "REPO_PATH=$REPO_PATH" >> $GITHUB_ENV

      # ── 2. Install system dependencies ───────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cppcheck \
            clang \
            clang-tools \
            libfuzzer-14-dev \
            gcc \
            g++
          pip install flawfinder
          # install cosign
          curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 \
            -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign

      # ── 3. Install Python dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install \
            tree-sitter \
            tree-sitter-languages \
            requests \
            PyYAML

      # ── 4. Run pipeline ───────────────────────────────────────────────────
      - name: Run SecOps Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QWEN_URL: ${{ secrets.QWEN_URL }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          REPO_PATH: ${{ env.REPO_PATH }}
        run: |
          python pipeline/orchestrator.py \
            --target /tmp/target_repo \
            --repo-path "$REPO_PATH"

      # ── 5. Upload report ──────────────────────────────────────────────────
      - name: Upload pipeline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secops-report
          path: /tmp/secops_report.json
          retention-days: 7
